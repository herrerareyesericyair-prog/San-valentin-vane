<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>💖 Mi San Valentín 💖</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffd6e8, #ffeef6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }.hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(#ff9fcf 2px, transparent 2px);
  background-size: 40px 40px;
  opacity: 0.25;
}

.card {
  background: #fff;
  border-radius: 24px;
  padding: 40px 30px;
  max-width: 700px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  position: relative;
}

h1 {
  color: #d63384;
  margin-bottom: 30px;
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 30px;
  gap: 20px;
}

.option {
  flex: 1;
  text-align: center;
}

.option img {
  max-width: 160px;
  border-radius: 16px;
  margin-bottom: 10px;
}

button {
  padding: 12px 22px;
  font-size: 18px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.3s ease;
}

#yesBtn {
  background: #ff6fae;
  color: white;
}

#noBtn {
  background: #ccc;
  color: #555;
}

#message {
  margin-top: 30px;
  font-size: 20px;
  color: #b02a6f;
  display: none;
}

  </style>
</head>
<body>
  <div class="hearts"></div>  <div class="card">
    <h1>¿Este 14 de febrero quisieras pasarlo como el amor de mi vida?</h1><div class="options">
  <div class="option">
    <img src="si.jpg" alt="Sí" />
    <br />
    <button id="yesBtn">Sí 💖</button>
  </div>

  <div class="option">
    <img src="no.jpg" alt="No" />
    <br />
    <button id="noBtn">No 😅</button>
  </div>
</div>

<div id="message">
  Sabía que dirías que sí (no tienes más opción) 🥰<br><br>
  Te quiero mucho mi Vane, estaremos juntos por siempre<br>
  (así tenga que obligarte, como ahora jejeje) 💕
</div>

  </div>  <script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const message = document.getElementById('message');

    let attempts = 0;
    let yesScale = 1;

    noBtn.addEventListener('click', () => {
      attempts++;
      yesScale += 0.2;
      yesBtn.style.transform = `scale(${yesScale})`;

      const card = document.querySelector('.card');
      const cardRect = card.getBoundingClientRect();

      const maxX = cardRect.width - noBtn.offsetWidth - 20;
      const maxY = cardRect.height - noBtn.offsetHeight - 20;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noBtn.style.position = 'absolute';
      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;

      if (attempts >= 6) {
        noBtn.style.display = 'none';
      }
    });

    yesBtn.addEventListener('click', () => {
      message.style.display = 'block';
      document.querySelector('.options').style.display = 'none';
    });
  </script></body>
</html>
