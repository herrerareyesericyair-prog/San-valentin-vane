<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>💖 Mi San Valentín 💖</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffd6e8, #ffeef6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-size: 18px;
    }.hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(#ff9fcf 2px, transparent 2px);
  background-size: 40px 40px;
  opacity: 0.25;
}

.card {
  background: #fff;
  border-radius: 28px;
  padding: 50px 40px;
  max-width: 900px;
  width: 95%;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  position: relative;
}

h1 {
  color: #d63384;
  margin-bottom: 40px;
  font-size: 32px;
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 30px;
  gap: 20px;
}

.option {
  flex: 1;
  text-align: center;
}

.option img {
  max-width: 220px;
  border-radius: 20px;
  margin-bottom: 15px;
}

button {
  padding: 16px 28px;
  font-size: 22px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.3s ease;
}

#yesBtn {
  background: #ff6fae;
  color: white;
}

#noBtn {
  background: #ccc;
  color: #555;
}

#message {
  margin-top: 30px;
  font-size: 20px;
  color: #b02a6f;
  display: none;
}

  </style>
</head>
<body>
  <div class="hearts"></div>  <div class="card">
    <h1>¿Este 14 de febrero quisieras pasarlo como el amor de mi vida?</h1><div class="options">
  <div class="option">
    <img src="si.jpg" alt="Sí" />
    <br />
    <button id="yesBtn">Sí 💖</button>
  </div>

  <div class="option">
    <img src="no.jpg" alt="No" />
    <br />
    <button id="noBtn">No 😅</button>
  </div>
</div>

<div id="message">
  Sabía que dirías que sí (no tienes más opción) 🥰<br><br>
  Te quiero mucho mi Vane, estaremos juntos por siempre<br>
  (así tenga que obligarte, como ahora jejeje) 💕
</div>

  </div>  <script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const message = document.getElementById('message');
    const options = document.querySelector('.options');
    const card = document.querySelector('.card');

    let attempts = 0;
    let yesScale = 1;
    const maxScale = 3.2;
    let escapeMode = false;

    function moveNoButton() {
      const cardRect = card.getBoundingClientRect();
      const maxX = cardRect.width - noBtn.offsetWidth - 20;
      const maxY = cardRect.height - noBtn.offsetHeight - 20;

      const randomX = Math.random() * Math.max(0, maxX);
      const randomY = Math.random() * Math.max(0, maxY);

      noBtn.style.position = 'absolute';
      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;
    }

    noBtn.addEventListener('click', () => {
      attempts++;

      if (yesScale < maxScale) {
        yesScale += 0.3;
        if (yesScale > maxScale) yesScale = maxScale;
        yesBtn.style.transform = `scale(${yesScale})`;
      }

      moveNoButton();

      if (attempts >= 3) {
        escapeMode = true;
      }

      if (attempts >= 6) {
        noBtn.style.display = 'none';
      }
    });

    noBtn.addEventListener('mouseenter', () => {
      if (!escapeMode) return;
      moveNoButton();
    });

    yesBtn.addEventListener('click', () => {
      options.style.display = 'none';
      message.style.display = 'block';
    });
  </script></body>
</html>
